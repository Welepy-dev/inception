services:
    mariadb:
        build: ./requirements/mariadb/
        container_name: mariadb
        image: mariadb
        restart: unless-stopped
        env_file: .env
        volumes:
            - mariadb_data:/var/lib/mysql
        networks:
            - inception
        secrets:
            - db_password
            - db_root_password

volumes:
    mariadb_data:
        name: mariadb_data
        driver: local
        driver_opts:
            type: none
            o: bind
            device: /home/marcio/data/mariadb/

networks:
    inception:
        name: inception
        driver: bridge

secrets:
    db_password:
        file: ../secrets/db_password.txt
    db_root_password:
        file: ../secrets/db_root_password.txt
